<main id="updateManagerApp" class="update-manager update-manager--kde" aria-label="Mises à jour (Discover)">
    <div class="kde-updates">
        <aside class="kde-updates__sidebar" aria-label="Navigation">
            <div class="kde-updates__search">
                <span class="kde-updates__search-icon" aria-hidden="true"></span>
                <input type="search" class="kde-updates__search-input" placeholder="Rechercher dans « Mises à jour »…" aria-label="Rechercher">
            </div>

            <nav class="kde-updates__nav" aria-label="Sections">
                <button type="button" class="kde-updates__navitem" disabled aria-disabled="true">
                    <span class="kde-updates__navicon kde-updates__navicon--home" aria-hidden="true"></span>
                    <span>Accueil</span>
                </button>
                <button type="button" class="kde-updates__navitem" disabled aria-disabled="true">
                    <span class="kde-updates__navicon kde-updates__navicon--installed" aria-hidden="true"></span>
                    <span>Installé(s)</span>
                </button>
                <button type="button" class="kde-updates__navitem is-active" aria-current="page">
                    <span class="kde-updates__navicon kde-updates__navicon--updates" aria-hidden="true"></span>
                    <span>Mises à jour</span>
                    <span class="kde-updates__badge" aria-label="3 mises à jour">3</span>
                </button>
                <button type="button" class="kde-updates__navitem" disabled aria-disabled="true">
                    <span class="kde-updates__navicon kde-updates__navicon--config" aria-hidden="true"></span>
                    <span>Configuration</span>
                </button>
                <button type="button" class="kde-updates__navitem" disabled aria-disabled="true">
                    <span class="kde-updates__navicon kde-updates__navicon--about" aria-hidden="true"></span>
                    <span>À propos</span>
                </button>
            </nav>

            <hr class="kde-updates__sep" aria-hidden="true">

            <nav class="kde-updates__cats" aria-label="Catégories">
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--all" aria-hidden="true"></span>
                    <span>Toutes les applications</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--accessibility" aria-hidden="true"></span>
                    <span>Accessibilité</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--office" aria-hidden="true"></span>
                    <span>Bureautique</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--development" aria-hidden="true"></span>
                    <span>Développement</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--education" aria-hidden="true"></span>
                    <span>Education</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--graphics" aria-hidden="true"></span>
                    <span>Graphisme</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--internet" aria-hidden="true"></span>
                    <span>Internet</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--games" aria-hidden="true"></span>
                    <span>Jeux</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--multimedia" aria-hidden="true"></span>
                    <span>Multimédia</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--science" aria-hidden="true"></span>
                    <span>Science &amp; Mathématiq...</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--system" aria-hidden="true"></span>
                    <span>Système</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--utilities" aria-hidden="true"></span>
                    <span>Utilitaires</span>
                </button>
                <button type="button" class="kde-updates__cat" disabled aria-disabled="true">
                    <span class="kde-updates__caticon kde-updates__caticon--addons" aria-hidden="true"></span>
                    <span>Modules d'applications</span>
                </button>
            </nav>
        </aside>

        <main class="kde-updates__main" aria-label="Mises à jour">
            <header class="kde-updates__header">
                <h1 class="kde-updates__title">Mises à jour</h1>
                <div class="kde-updates__actions">
                    <button type="button" class="kde-updates__action" data-um-kde-action="updateAll">
                        <span class="kde-updates__action-icon kde-updates__action-icon--updateall" aria-hidden="true"></span>
                        <span>Tout mettre à jour</span>
                    </button>
                    <button type="button" class="kde-updates__action" data-um-kde-action="refresh">
                        <span class="kde-updates__action-icon kde-updates__action-icon--refresh" aria-hidden="true"></span>
                        <span>Rafraîchir</span>
                    </button>
                </div>
            </header>

            <section class="kde-updates__list" aria-label="Logiciels du système">
                <h2 class="kde-updates__section-title">Logiciels du système</h2>
                <div class="kde-updates__rows" role="list">
                    <div class="kde-updates__row" role="listitem">
                        <input type="checkbox" checked aria-label="Sélectionner cpupower">
                        <button type="button" class="kde-updates__dots" aria-label="Actions cpupower" disabled aria-disabled="true">
                            <span class="kde-updates__dots-icon" aria-hidden="true"></span>
                        </button>
                        <div class="kde-updates__row-text">
                            <span class="kde-updates__row-name">cpupower</span>
                            <span class="kde-updates__row-sub">7.0.9-13.44 → 7.0.9-13.46</span>
                        </div>
                        <span class="kde-updates__row-size">443,2 Kio</span>
                    </div>
                    <div class="kde-updates__row" role="listitem">
                        <input type="checkbox" checked aria-label="Sélectionner cpupower-bash-completion">
                        <button type="button" class="kde-updates__dots" aria-label="Actions cpupower-bash-completion" disabled aria-disabled="true">
                            <span class="kde-updates__dots-icon" aria-hidden="true"></span>
                        </button>
                        <div class="kde-updates__row-text">
                            <span class="kde-updates__row-name">cpupower-bash-completion</span>
                            <span class="kde-updates__row-sub">7.0.9-13.44 → 7.0.9-13.46</span>
                        </div>
                        <span class="kde-updates__row-size">3,4 Kio</span>
                    </div>
                    <div class="kde-updates__row" role="listitem">
                        <input type="checkbox" checked aria-label="Sélectionner kernel-default">
                        <button type="button" class="kde-updates__dots" aria-label="Actions kernel-default" disabled aria-disabled="true">
                            <span class="kde-updates__dots-icon" aria-hidden="true"></span>
                        </button>
                        <div class="kde-updates__row-text">
                            <span class="kde-updates__row-name">kernel-default</span>
                            <span class="kde-updates__row-sub">7.0.9-1.1 → 7.0.9-2.1</span>
                        </div>
                        <span class="kde-updates__row-size">280,0 Mio</span>
                    </div>
                </div>
            </section>

            <footer class="kde-updates__footer" aria-label="Actions et taille totale">
                <button type="button" class="kde-updates__footer-btn" disabled aria-disabled="true">Tout sélectionner</button>
                <button type="button" class="kde-updates__footer-btn" disabled aria-disabled="true">Ne rien sélectionner</button>
                <span class="kde-updates__total">Taille totale&nbsp;: 456,1 Mio</span>
            </footer>
        </main>
    </div>
</main>
