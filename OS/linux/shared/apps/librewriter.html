    <button type="button" class="lw-tb-btn" data-tooltip="Insérer un commentaire (Ctrl+Alt+C)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2h12v9H6l-4 3V2z"/><line x1="4" y1="6" x2="10" y2="6"/><line x1="4" y1="8.5" x2="8" y2="8.5"/></svg>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Vérification orthographique (F7)">
      <svg viewBox="0 0 16 16" fill="currentColor"><text x="1" y="9" font-size="7" font-weight="bold" font-family="sans-serif">ABC</text><path d="M2 13l2 2 4-4" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>

    <button type="button" class="lw-tb-btn" data-tooltip="Vérification automatique de l'orthographe">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M4 5l4-3 4 3v6l-4 3-4-3V5z"/><path d="M8 8 l0 0" stroke-width="2"/><line x1="8" y1="6" x2="8" y2="9"/><circle cx="8" cy="11" r="0.7" fill="currentColor" stroke="none"/></svg>
    </button>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Rechercher &amp; Remplacer (Ctrl+H)">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4"/><line x1="9.5" y1="9.5" x2="14" y2="14"/></svg>
    </button>

  </div>

  <!-- ═══════════ FORMATTING TOOLBAR ═══════════ -->
  <div class="lw-toolbar lw-toolbar--fmt" role="toolbar" aria-label="Barre de Formatage">

    <select class="lw-tb-select lw-tb-select--style" id="lw-style-select" aria-label="Style de paragraphe" data-tooltip="Style de paragraphe">
      <option value="">Style de paragraph</option>
      <option value="Corps de texte">Corps de texte</option>
      <option value="Titre 1">Titre 1</option>
      <option value="Titre 2">Titre 2</option>
      <option value="Titre 3">Titre 3</option>
      <option value="Titre 4">Titre 4</option>
      <option value="Préformaté">Préformat</option>
      <option value="Citation">Citation</option>
      <option value="Pied de page">Pied de page</option>
    </select>

    <select class="lw-tb-select lw-tb-select--font" id="lw-font-select" aria-label="Police de caractères" data-tooltip="Nom de la police">
      <option value="Liberation Serif">Liberation Serif</option>
      <option value="Liberation Sans">Liberation Sans</option>
      <option value="Liberation Mono">Liberation Mono</option>
      <option value="DejaVu Serif">DejaVu Serif</option>
      <option value="DejaVu Sans">DejaVu Sans</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Arial">Arial</option>
      <option value="Helvetica">Helvetica</option>
      <option value="Georgia">Georgia</option>
      <option value="Courier New">Courier New</option>
    </select>

    <select class="lw-tb-select lw-tb-select--size" id="lw-size-select" aria-label="Taille de police" data-tooltip="Taille des caractères (pts)">
      <option value="1">8</option>
      <option value="1">9</option>
      <option value="1">10</option>
      <option value="2">11</option>
      <option value="3" selected>12</option>
      <option value="3">14</option>
      <option value="4">16</option>
      <option value="4">18</option>
      <option value="5">20</option>
      <option value="5">22</option>
      <option value="6">24</option>
      <option value="6">28</option>
      <option value="7">36</option>
      <option value="7">48</option>
      <option value="7">72</option>
    </select>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn lw-tb-btn--fmt" data-tooltip="Gras (Ctrl+G)" data-cmd="bold" id="btn-bold">
      <span class="lw-fmt-icon lw-fmt-icon--bold">G</span>
    </button>
    <button type="button" class="lw-tb-btn lw-tb-btn--fmt" data-tooltip="Italique (Ctrl+I)" data-cmd="italic" id="btn-italic">
      <span class="lw-fmt-icon lw-fmt-icon--italic">I</span>
    </button>
    <button type="button" class="lw-tb-btn lw-tb-btn--fmt" data-tooltip="Souligné (Ctrl+U)" data-cmd="underline" id="btn-underline">
      <span class="lw-fmt-icon lw-fmt-icon--underline">S</span>
    </button>
    <button type="button" class="lw-tb-btn lw-tb-btn--fmt" data-tooltip="Barré" data-cmd="strikeThrough" id="btn-strike">
      <span class="lw-fmt-icon lw-fmt-icon--strike">S</span>
    </button>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Couleur de police">
      <svg viewBox="0 0 16 16" fill="currentColor"><text x="2" y="10" font-size="9" font-weight="bold" font-family="serif">A</text><rect x="2" y="12" width="12" height="2.5" fill="#e5534b"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Surlignage">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="2" y="11" width="12" height="3.5" fill="#f5c518" opacity="0.9"/><text x="2.5" y="10" font-size="9" font-weight="bold" font-family="serif">A</text></svg>
    </button>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Aligner à gauche (Ctrl+L)" data-cmd="justifyLeft" id="btn-left">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="1.8"/><rect x="1" y="5.5" width="9" height="1.8"/><rect x="1" y="9" width="12" height="1.8"/><rect x="1" y="12.5" width="7" height="1.8"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Centrer (Ctrl+E)" data-cmd="justifyCenter" id="btn-center">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="1.8"/><rect x="3.5" y="5.5" width="9" height="1.8"/><rect x="2" y="9" width="12" height="1.8"/><rect x="4.5" y="12.5" width="7" height="1.8"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Aligner à droite (Ctrl+R)" data-cmd="justifyRight" id="btn-right">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="1.8"/><rect x="6" y="5.5" width="9" height="1.8"/><rect x="3" y="9" width="12" height="1.8"/><rect x="8" y="12.5" width="7" height="1.8"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Justifier (Ctrl+J)" data-cmd="justifyFull" id="btn-justify">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="2" width="14" height="1.8"/><rect x="1" y="5.5" width="14" height="1.8"/><rect x="1" y="9" width="14" height="1.8"/><rect x="1" y="12.5" width="9" height="1.8"/></svg>
    </button>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Liste à puces non ordonnée" data-cmd="insertUnorderedList" id="btn-ul">
      <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="2.5" cy="3.5" r="1.4"/><circle cx="2.5" cy="8" r="1.4"/><circle cx="2.5" cy="12.5" r="1.4"/><rect x="5" y="2.5" width="10" height="1.8"/><rect x="5" y="7" width="10" height="1.8"/><rect x="5" y="11.5" width="10" height="1.8"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Numérotation" data-cmd="insertOrderedList" id="btn-ol">
      <svg viewBox="0 0 16 16" fill="currentColor"><text x="1" y="5.5" font-size="4.5" font-family="sans-serif">1.</text><text x="1" y="9.5" font-size="4.5" font-family="sans-serif">2.</text><text x="1" y="13.5" font-size="4.5" font-family="sans-serif">3.</text><rect x="6" y="2.5" width="9" height="1.8"/><rect x="6" y="7" width="9" height="1.8"/><rect x="6" y="11.5" width="9" height="1.8"/></svg>
    </button>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Réduire le retrait" data-cmd="outdent">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 5l3.5 3L1 11V5z"/><rect x="6.5" y="3.5" width="8.5" height="1.8"/><rect x="6.5" y="7.5" width="8.5" height="1.8"/><rect x="6.5" y="11" width="8.5" height="1.8"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Augmenter le retrait" data-cmd="indent">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5l3.5 3-3.5 3V5z"/><rect x="1" y="3.5" width="8.5" height="1.8"/><rect x="1" y="7.5" width="8.5" height="1.8"/><rect x="1" y="11" width="8.5" height="1.8"/></svg>
    </button>

    <div class="lw-tb-sep" role="separator"></div>

    <button type="button" class="lw-tb-btn" data-tooltip="Interligne">
      <svg viewBox="0 0 16 16" fill="currentColor"><rect x="5" y="2" width="10" height="1.8"/><rect x="5" y="7" width="10" height="1.8"/><rect x="5" y="12" width="10" height="1.8"/><path d="M1 4l1.5-2L4 4M1 10l1.5 2L4 10" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
    </button>
    <button type="button" class="lw-tb-btn" data-tooltip="Espacement des caractères">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="2" y1="3" x2="14" y2="3"/><line x1="2" y1="13" x2="14" y2="13"/><line x1="5" y1="3" x2="5" y2="13"/><line x1="11" y1="3" x2="11" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
    </button>

  </div>

  <!-- ═══════════ BODY (ruler + workspace + sidebar) ═══════════ -->
  <div class="lw-body">

    <!-- Editor area (ruler + scroll) -->
    <div class="lw-editor">

      <!-- Horizontal ruler -->
      <div class="lw-ruler" aria-hidden="true">
        <div class="lw-ruler__corner"></div>
        <div class="lw-ruler__bar" id="lw-ruler-bar"></div>
      </div>

      <!-- Scrollable page area -->
      <div class="lw-scroll" id="lw-scroll">
        <div class="lw-page" id="lw-page"
             contenteditable="true"
             lang="fr"
             spellcheck="true"
             role="textbox"
             aria-multiline="true"
             aria-label="Document texte"></div>
      </div>

    </div>

    <!-- Right sidebar -->
    <aside class="lw-sidebar" aria-label="Panneau latéral">

      <button type="button" class="lw-sidebar__btn lw-sidebar__btn--active" data-tooltip="Propriétés">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="2.3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4"/></svg>
      </button>
      <button type="button" class="lw-sidebar__btn" data-tooltip="Styles et mise en forme">
        <svg viewBox="0 0 16 16" fill="currentColor"><text x="2" y="9" font-size="8" font-weight="bold" font-family="serif">A</text><rect x="1" y="11" width="14" height="1.5"/><rect x="1" y="13.5" width="10" height="1.5"/></svg>
      </button>
      <button type="button" class="lw-sidebar__btn" data-tooltip="Galerie">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="8" height="7" rx="1"/><rect x="5" y="2" width="9" height="7" rx="1"/><circle cx="4" cy="6.5" r="1.2"/><path d="M1 9.5l2-2 2.5 2.5"/></svg>
      </button>
      <button type="button" class="lw-sidebar__btn" data-tooltip="Navigateur">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="8" r="6"/><path d="M8 5l-2.5 5.5 2.5-2 2.5 2L8 5z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button type="button" class="lw-sidebar__btn" data-tooltip="Fonctions">
        <svg viewBox="0 0 16 16" fill="currentColor"><text x="2" y="12" font-size="10" font-style="italic" font-family="serif">f</text><text x="7" y="8" font-size="6" font-family="sans-serif">x</text></svg>
      </button>
      <button type="button" class="lw-sidebar__btn" data-tooltip="Styles de page">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="3" y="1" width="10" height="14" rx="1"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="8.5" y2="11"/></svg>
      </button>
      <button type="button" class="lw-sidebar__btn" data-tooltip="Modèles de document">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="9" height="12" rx="1"/><path d="M8 2v4h4L8 2z"/><rect x="7" y="4" width="7" height="10" rx="1"/></svg>
      </button>

      <div class="lw-sidebar__spacer"></div>

      <button type="button" class="lw-sidebar__collapse" aria-label="Replier le panneau latéral" data-tooltip="Replier le panneau">
        <svg viewBox="0 0 8 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M3 5l3 3-3 3"/></svg>
      </button>

    </aside>
  </div>

  <!-- ═══════════ STATUS BAR ═══════════ -->
  <div class="lw-statusbar" role="status" aria-live="off">

    <div class="lw-statusbar__left">
      <span class="lw-statusbar__item" id="lw-page-count" title="Page actuelle / Pages totales">Page 1 de 1</span>
      <span class="lw-statusbar__divider"></span>
      <span class="lw-statusbar__item" id="lw-word-count" title="Nombre de mots et de caractères">0 mot, 0 caractère</span>
      <span class="lw-statusbar__divider"></span>
      <span class="lw-statusbar__item" title="Style de page actuel">Style de page par défaut</span>
      <span class="lw-statusbar__divider"></span>
      <span class="lw-statusbar__item" title="Langue de correction orthographique">Français (France)</span>
    </div>

    <div class="lw-statusbar__right">
      <div class="lw-statusbar__views" role="group" aria-label="Mode d'affichage">
        <button type="button" class="lw-statusbar__view lw-statusbar__view--active" data-tooltip="Affichage Normal" aria-pressed="true">
          <svg viewBox="0 0 16 12" fill="currentColor"><rect x="1" y="1" width="14" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="3" width="10" height="6"/></svg>
        </button>
        <button type="button" class="lw-statusbar__view" data-tooltip="Affichage Web" aria-pressed="false">
          <svg viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="1" y="1" width="14" height="10" rx="1"/><line x1="1" y1="4" x2="15" y2="4"/><circle cx="3" cy="2.5" r="0.7" fill="currentColor" stroke="none"/><circle cx="5.5" cy="2.5" r="0.7" fill="currentColor" stroke="none"/></svg>
        </button>
        <button type="button" class="lw-statusbar__view" data-tooltip="Affichage Plein écran" aria-pressed="false">
          <svg viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><path d="M1 4V1h3M12 1h3v3M1 8v3h3M12 11h3V8"/></svg>
        </button>
      </div>

      <div class="lw-statusbar__zoom-wrap">
        <button type="button" class="lw-statusbar__zoom-btn" id="lw-zoom-out" aria-label="Zoom arrière" title="Zoom arrière">−</button>
        <input type="range" class="lw-statusbar__zoom-slider" id="lw-zoom"
               min="50" max="200" value="100" step="10"
               aria-label="Niveau de zoom" aria-valuetext="100%">
        <button type="button" class="lw-statusbar__zoom-btn" id="lw-zoom-in" aria-label="Zoom avant" title="Zoom avant">+</button>
        <span class="lw-statusbar__zoom-value" id="lw-zoom-value">100 %</span>
      </div>
    </div>

  </div>

</div>
