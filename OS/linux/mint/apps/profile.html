<main id="profileApp" class="profile-app" aria-label="Profil de la distribution">

    <header class="profile-app__header">
        <img class="profile-app__logo" src="./assets/mint.webp" alt="Logo Linux Mint">
        <div class="profile-app__header-text">
            <h1 class="profile-app__name" id="profile-name"></h1>
            <p class="profile-app__version" id="profile-version"></p>
        </div>
    </header>

    <p class="profile-app__tagline" id="profile-tagline"></p>
    <p class="profile-app__description" id="profile-description"></p>

    <section class="profile-app__section">
        <h2 class="profile-app__section-title">Évaluation</h2>
        <ul class="profile-app__stats" id="profile-stats">
            <li class="profile-stat">
                <span class="profile-stat__label">Facilité d'utilisation</span>
                <span class="profile-stat__stars" data-stat="ease" aria-label="5 étoiles sur 5"></span>
            </li>
            <li class="profile-stat">
                <span class="profile-stat__label">Communauté</span>
                <span class="profile-stat__stars" data-stat="community" aria-label="4 étoiles sur 5"></span>
            </li>
            <li class="profile-stat">
                <span class="profile-stat__label">Support</span>
                <span class="profile-stat__stars" data-stat="support" aria-label="4 étoiles sur 5"></span>
            </li>
        </ul>
    </section>

    <section class="profile-app__section">
        <h2 class="profile-app__section-title">Points forts</h2>
        <ul class="profile-app__highlights" id="profile-highlights"></ul>
    </section>

    <footer class="profile-app__footer">
        <a class="profile-app__link" id="profile-url" href="#" target="_blank" rel="noopener noreferrer">
            Découvrir le site officiel ↗
        </a>
        <button type="button" class="profile-app__link profile-app__button" aria-label="Télécharger ISO">
            Télécharger ISO
        </button>
    </footer>

</main>
