<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./media/img/assets/mx-logo.png" type="image/png">
    <link rel="stylesheet" href="./style/style.css?v=20260514b" type="text/css">
    <link rel="stylesheet" href="../../../shared/apps/style/Dossier personnel.base.css" type="text/css">
    <link rel="stylesheet" href="./style/apps/Dossier personnel.skin.css" type="text/css">
    <title>MX Linux KDE - CapsuleOS</title>
</head>
<body id="mx-kde">
    <object id="desktop">
        <a class="desktop-shortcut" target="windowElement" data-link="profile" title="MX Linux KDE - À propos">
            <img src="./media/img/apps/user-info.png" alt="MX Linux KDE - À propos">
            <span>MX Linux KDE<br>À propos</span>
        </a>
        <div class="windowElement" data-link="mainMenu" id="mainMenu" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="nemo" id="nemo" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="firefox" id="firefox" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="terminal" id="terminal" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="themes" id="themes" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="profile" id="profile" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="checklist" id="checklist" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="visionneur_images" id="visionneur_images" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="visionneur_pdf" id="visionneur_pdf" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="lecteur_multimedia" id="lecteur_multimedia" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="librewriter" id="librewriter" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="update_manager" id="update_manager" style="display: none; position: fixed;"></div>
    </object>
    <footer id="tableau">
        <nav class="taskbar-pins" aria-label="Applications épinglées">
            <a class="taskbar-pins__launcher" target="windowElement" data-link="mainMenu" title="Ouvrir le menu principal">
                <img src="./media/img/assets/mx-logo.png" alt="Logo MX Linux KDE" title="Menu principal">
            </a>
            <div class="taskbar-pins__apps">
                <a target="windowElement" data-link="nemo" title="Explorateur de fichiers Dolphin">
                    <img src="./media/img/apps/org.kde.dolphin.svg" alt="Dolphin" title="Explorateur de fichiers Dolphin">
                </a>
                <a target="windowElement" data-link="firefox" title="Ouvrir un navigateur WEB">
                    <img src="./media/img/apps/firefox.svg" alt="Firefox" title="Ouvrir un navigateur WEB">
                </a>
                <a target="windowElement" data-link="terminal" title="Ouvrir un terminal">
                    <img src="./media/img/apps/utilities-terminal.svg" alt="Terminal" title="Ouvrir un terminal">
                </a>
                <a target="windowElement" data-link="librewriter" title="LibreOffice Writer">
                    <img src="./media/img/apps/libreoffice-writer.svg" alt="LibreOffice Writer" title="LibreOffice Writer">
                </a>
                <a target="windowElement" data-link="themes" title="Ouvrir les themes">
                    <img src="./media/img/apps/systemsettings.svg" alt="Configuration système" title="Ouvrir les themes">
                </a>
                <a target="windowElement" data-link="checklist" title="Missions de découverte">
                    <img src="./media/img/apps/mx-tools.svg" alt="Checklist" title="Missions de découverte">
                </a>
            </div>
        </nav>
        <div class="taskbar-right">
            <div class="taskbar-tray" aria-label="Zone de notification">
                <a class="taskbar-tray__link" target="windowElement" data-link="terminal" title="Terminal">
                    <img src="./media/img/panel/terminal.svg" alt="" aria-hidden="true">
                </a>
                <span class="taskbar-tray__item" title="Presse-papiers">
                    <img src="./media/img/panel/clipboard.svg" alt="" aria-hidden="true">
                </span>
                <a class="taskbar-tray__link" target="windowElement" data-link="themes" title="Configuration système">
                    <img src="./media/img/panel/settings.svg" alt="" aria-hidden="true">
                </a>
                <span class="taskbar-tray__item" title="Affichage">
                    <img src="./media/img/panel/display.svg" alt="" aria-hidden="true">
                </span>
                <button type="button" class="taskbar-tray__btn taskbar-tray__btn--updates"
                        data-update-manager-tray
                        data-has-updates="true"
                        aria-label="Mises à jour disponibles"
                        title="Mises à jour">
                    <span class="taskbar-tray__icon taskbar-tray__icon--updates" aria-hidden="true"></span>
                </button>
                <button type="button" class="taskbar-tray__btn" id="tray-sound-btn"
                        aria-expanded="false" aria-controls="volume-popover"
                        aria-label="Contrôle du volume">
                    <span class="taskbar-tray__icon" id="tray-sound-icon" aria-hidden="true"></span>
                </button>
                <span class="taskbar-tray__item" title="Réseau">
                    <img src="./media/img/panel/network.svg" alt="" aria-hidden="true">
                </span>
            </div>
            <button type="button" class="taskbar-clock-trigger" id="taskbar-clock-trigger" aria-expanded="false" aria-controls="taskbar-calendar-popover" aria-label="Date et heure">
                <time class="taskbar__clock" id="taskbar-clock" datetime="">--:--</time>
                <span class="taskbar__date" id="taskbar-date" aria-hidden="true">--/--/----</span>
            </button>
            <button type="button" class="taskbar-show-desktop" aria-label="Afficher le bureau"></button>
        </div>
    </footer>

    <div class="calendar-popover calendar-popover--kde" id="taskbar-calendar-popover" role="dialog" aria-label="Calendrier" hidden>
        <header class="calendar-popover__header">
            <h2 class="calendar-popover__month-title" id="cal-month-title">Avril</h2>
            <div class="calendar-popover__header-actions">
                <button type="button" class="calendar-popover__icon-btn" aria-label="Paramètres de date et d'heure" disabled>
                    <img src="./media/img/panel/calendar-settings.svg" alt="" aria-hidden="true">
                </button>
                <button type="button" class="calendar-popover__icon-btn" aria-label="Épingler le calendrier" disabled>
                    <img src="./media/img/panel/calendar-pin.svg" alt="" aria-hidden="true">
                </button>
            </div>
        </header>
        <nav class="calendar-popover__tabs" aria-label="Vue calendrier">
            <button type="button" class="calendar-popover__tab is-active" data-tab="days" aria-selected="true">Jours</button>
            <button type="button" class="calendar-popover__tab" disabled aria-selected="false">Mois</button>
            <button type="button" class="calendar-popover__tab" disabled aria-selected="false">Années</button>
        </nav>
        <div class="calendar-popover__toolbar">
            <button type="button" class="calendar-popover__today-btn" id="cal-today-btn">Aujourd'hui</button>
            <div class="calendar-popover__month-nav">
                <button type="button" class="calendar-popover__arrow" id="cal-prev-month" aria-label="Mois précédent">‹</button>
                <button type="button" class="calendar-popover__arrow" id="cal-next-month" aria-label="Mois suivant">›</button>
            </div>
        </div>
        <div class="calendar-popover__week-row" id="cal-weekday-row" aria-hidden="true"></div>
        <div class="calendar-popover__days" id="cal-days-grid"></div>
    </div>
    <div class="volume-popover" id="volume-popover" role="dialog" aria-label="Volume" hidden>
        <div class="volume-popover__header">
            <span class="volume-popover__label">Volume</span>
            <span class="volume-popover__value" id="volume-value">100%</span>
        </div>
        <div class="volume-popover__body">
            <button type="button" class="volume-popover__mute-btn" id="volume-mute-btn"
                    aria-label="Couper le son" aria-pressed="false">
                <span class="volume-popover__mute-icon" id="volume-mute-icon" aria-hidden="true"></span>
            </button>
            <input type="range" class="volume-slider" id="volume-slider"
                   min="0" max="100" value="100" step="1"
                   aria-label="Niveau du volume" aria-valuetext="100%">
        </div>
    </div>
    <script>

        window.CAPSULE_TEMPLATE_OVERRIDES = {
            update_manager: '../../../shared/apps/update_manager_kde.html'

        window.CAPSULE_CONTENT_ROOT = '../../../shared/content/Dossier_personnel';
        window.CAPSULE_SKIN_BASE = '.';

        window.CAPSULE_EXPLORER_TEMPLATE = 'dolphin';
        window.CAPSULE_EXPLORER_SKIN_KEY = 'dolphin';
        window.CAPSULE_FILE_EXPLORER_ICON_MAP = {

            Bureau: './media/img/elements/places32/user-desktop.svg',

            Public: './media/img/elements/places32/folder-publicshare.svg',
            'Téléchargements': './media/img/elements/places32/folder-download.svg',
            'Vidéos': './media/img/elements/places32/folder-videos.svg',
            'Modèles': './media/img/elements/places32/folder-templates.svg',
            file: './media/img/mimeTypes/application-x-generic.svg',
            pdf: './media/img/mimeTypes/application-x-generic.svg',
            doc: './media/img/mimeTypes/application-x-generic.svg',
            txt: './media/img/mimeTypes/application-x-generic.svg',
            sh: './media/img/mimeTypes/application-x-generic.svg',
            html: './media/img/mimeTypes/application-x-generic.svg',
            css: './media/img/mimeTypes/application-x-generic.svg',
            js: './media/img/mimeTypes/application-x-generic.svg',
            ogg: './media/img/mimeTypes/application-x-generic.svg',
            mp3: './media/img/mimeTypes/application-x-generic.svg',
            wav: './media/img/mimeTypes/application-x-generic.svg',
            mp4: './media/img/mimeTypes/application-x-generic.svg',

            jpeg: './media/img/mimeTypes/application-x-generic.svg',

        };
        window.CAPSULE_EMBED_SKIN_KEY = 'mxkde';
        window.CAPSULE_CHECKLIST_STORAGE_KEY = 'mxkde-checklist';
        window.CAPSULE_SITE_HOME = '../../../../../index.html';
        window.CAPSULE_LINUX_HUB = '../../../index.html';
        window.CAPSULE_TERMINAL_OS_FAMILY = 'linux';
        window.CAPSULE_TERMINAL_PROFILE = 'debian';
        window.CAPSULE_TERMINAL_USER = 'mx-linux';
        window.CAPSULE_TERMINAL_HOST = 'mx';
        window.CAPSULE_TERMINAL_HOME = '/home/user';
    </script>
