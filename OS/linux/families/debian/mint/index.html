<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/mint.webp" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css?v=20260421a" type="text/css">
    <link rel="stylesheet" href="../../../shared/apps/style/Dossier personnel.base.css" type="text/css">
    <link rel="stylesheet" href="./style/apps/Dossier personnel.skin.css" type="text/css">
    <title>Mint</title>
</head>
<body id="mint">
    <object id="desktop">
        <a class="desktop-shortcut" target="windowElement" data-link="profile" title="Linux Mint Cinnamon À Propos">
            <img src="./media/img/apps/user-info.png" alt="Linux Mint Cinnamon À Propos">
            <span>Linux Mint Cinnamon<br>À Propos</span>
        </a>
        <div class="windowElement" data-link="mainMenu" id="mainMenu" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="nemo" id="nemo" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="firefox" id="firefox" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="terminal" id="terminal" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="themes" id="themes" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="profile" id="profile" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="checklist" id="checklist" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="visionneur_images" id="visionneur_images" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="visionneur_pdf" id="visionneur_pdf" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="lecteur_multimedia" id="lecteur_multimedia" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="librewriter" id="librewriter" style="display: none; position: fixed;"></div>
        <div class="windowElement" data-link="update_manager" id="update_manager" style="display: none; position: fixed;"></div>
    </object>
    <footer id="tableau">
        <nav>
            <a target="windowElement" data-link="mainMenu" title="Ouvrir le menu principal">
                <img src="./media/img/assets/logo.svg" alt="Logo de Linux Mint" title="Menu principal">
            </a>
            <a target="windowElement" data-link="nemo" title="Explorateur de fichiers nemo">
                <img src="./media/img/elements/nemo/folder.png" alt="Nemo" title="Explorateur de fichiers nemo">
            </a>
            <a target="windowElement" data-link="firefox" title="Ouvrir un navigateur WEB">
                <img src="../../../shared/media/img/apps/firefox.png" alt="Firefox" title="Ouvrir un navigateur WEB">
            </a>
            <a target="windowElement" data-link="terminal" title="Ouvrir un terminal">
                <img src="./media/img/apps/utilities-terminal.png" alt="Terminal" title="Ouvrir un terminal">
            </a>
            <a target="windowElement" data-link="librewriter" title="LibreOffice Writer">
                <img src="./media/img/apps/libreoffice-writer.png" alt="LibreOffice Writer" title="LibreOffice Writer">
            </a>
            <a target="windowElement" data-link="themes" title="Ouvrir les themes">
                <img src="./media/img/apps/preferences-desktop-theme.png" alt="Themes" title="Ouvrir les themes">
            </a>
            <a target="windowElement" data-link="checklist" title="Missions de découverte">
                <img src="./media/img/apps/checkbox.png" alt="Checklist" title="Missions de découverte">
            </a>
            <a href="../../../../../index.html">
                <img src="../../../../../assets/accueil.svg" alt="Retour à l'accueil" title="Retour à l'accueil">
            </a>
        </nav>
        <div class="taskbar-right">
            <div class="taskbar-tray">
                <button type="button"
                        class="taskbar-tray__btn taskbar-tray__btn--updates"
                        data-update-manager-tray
                        data-has-updates="true"
                        aria-label="Mises à jour disponibles"
                        title="Gestionnaire de mise à jour">
                    <span class="taskbar-tray__icon taskbar-tray__icon--shield" aria-hidden="true"></span>
                </button>
                <span class="taskbar-tray__icon taskbar-tray__icon--network" aria-hidden="true" title="Réseau"></span>
                <button type="button" class="taskbar-tray__btn" id="tray-sound-btn"
                        aria-expanded="false" aria-controls="volume-popover"
                        aria-label="Contrôle du volume">
                    <span class="taskbar-tray__icon" id="tray-sound-icon" aria-hidden="true"></span>
                </button>
            </div>
            <button type="button" class="taskbar-clock-trigger" id="taskbar-clock-trigger" aria-expanded="false" aria-controls="taskbar-calendar-popover" aria-label="Date et heure">
                <time class="taskbar__clock" id="taskbar-clock" datetime="">--:--</time>
            </button>
        </div>
    </footer>

    <div class="calendar-popover" id="taskbar-calendar-popover" role="dialog" aria-label="Calendrier" hidden>
        <header class="calendar-popover__top">
            <div class="calendar-popover__long-date" id="cal-long-date"></div>
        </header>
        <div class="calendar-popover__columns">
            <div class="calendar-popover__events">
                <div class="calendar-popover__events-inner">
                    <span class="calendar-popover__events-icon" aria-hidden="true"></span>
                    <p class="calendar-popover__events-text">Aucun évènement</p>
                </div>
            </div>
            <div class="calendar-popover__calendar">
                <div class="calendar-popover__cal-head">
                    <div class="calendar-popover__weekday-big" id="cal-weekday-big"></div>
                    <div class="calendar-popover__date-sub" id="cal-date-sub"></div>
                </div>
                <div class="calendar-popover__month-nav">
                    <button type="button" class="calendar-popover__arrow" id="cal-prev-month" aria-label="Mois précédent">‹</button>
                    <span class="calendar-popover__month-label" id="cal-month-label"></span>
                    <button type="button" class="calendar-popover__arrow" id="cal-next-month" aria-label="Mois suivant">›</button>
                </div>
                <div class="calendar-popover__week-row" id="cal-weekday-row" aria-hidden="true"></div>
                <div class="calendar-popover__days" id="cal-days-grid"></div>
            </div>
        </div>
        <footer class="calendar-popover__bottom">
            <button type="button" class="calendar-popover__settings-btn">Paramètres de date et d'heure</button>
        </footer>
    </div>
    <div class="volume-popover" id="volume-popover" role="dialog" aria-label="Volume" hidden>
        <div class="volume-popover__header">
            <span class="volume-popover__label">Volume</span>
            <span class="volume-popover__value" id="volume-value">100%</span>
        </div>
        <div class="volume-popover__body">
            <button type="button" class="volume-popover__mute-btn" id="volume-mute-btn"
                    aria-label="Couper le son" aria-pressed="false">
                <span class="volume-popover__mute-icon" id="volume-mute-icon" aria-hidden="true"></span>
            </button>
            <input type="range" class="volume-slider" id="volume-slider"
                   min="0" max="100" value="100" step="1"
                   aria-label="Niveau du volume" aria-valuetext="100%">
        </div>
    </div>
    <script>
        window.CAPSULE_APPS_BASE = '../../../shared/apps';
        window.CAPSULE_CONTENT_ROOT = '../../../shared/content/Dossier_personnel';
        window.CAPSULE_SKIN_BASE = '.';
        window.CAPSULE_STRINGS_URL = './content/strings.json';
        window.CAPSULE_EXPLORER_APP_ID = 'nemo';
        window.CAPSULE_EXPLORER_DISPLAY_NAME = 'Nemo';
        window.CAPSULE_EXPLORER_TEMPLATE = 'nemo';
        window.CAPSULE_EMBED_SKIN_KEY = 'mint';
        window.CAPSULE_CHECKLIST_STORAGE_KEY = 'mint-checklist';
        window.CAPSULE_SITE_HOME = '../../../../../index.html';
        window.CAPSULE_LINUX_HUB = '../../../index.html';
        window.CAPSULE_TERMINAL_OS_FAMILY = 'linux';
        window.CAPSULE_TERMINAL_PROFILE = 'debian';
    </script>
    <script src="../../../../../js/capsule-pick-return.js"></script>
    <script src="../../../kernel/js/capsule-app-embed.js?v=20260427"></script>

    <script src="../../../kernel/js/windowContainer.js?v=20260421a"></script>
    <script src="../../../kernel/js/windowHeaderButton.js?v=20260421a"></script>
    <script src="../../../kernel/js/resizeWindow.js"></script>

    <script src="../../../kernel/js/mainMenu-data.js?v=20260421a"></script>
    <script src="../../../kernel/js/mainMenu.js?v=20260428"></script>
    <script src="../../../kernel/js/themes.js?v=20260421a"></script>
    <script src="./content/profile-data.js"></script>
    <script src="../../../kernel/js/profile.js"></script>
    <script src="../../../kernel/js/checklist.js"></script>
    <script src="../../../kernel/js/firefoxBrowser.js"></script>
    <script src="../../../kernel/js/contentLoader.js?v=20260427b"></script>
    <script src="../../../kernel/js/fileExplorer/fileExplorerHeader.js"></script>
    <script src="../../../kernel/js/fileExplorer/fileExplorerContainer.js"></script>
    <script src="../../../kernel/js/fileExplorer/fileExplorerCore.js"></script>
    <script src="../../../kernel/js/fileExplorer/fileExplorerInfo.js"></script>
    <script src="../../../kernel/js/fileViewerRouter.js"></script>
    <script src="../../../kernel/js/fileExplorer/fileExplorerLoader.js"></script>
    <script src="../../../kernel/js/date.js"></script>
    <script src="../../../kernel/js/calendar-popover.js"></script>
    <script src="../../../kernel/js/terminal/config/command-registry.js"></script>
    <script src="../../../kernel/js/terminal/config/profiles/linux/debian.js"></script>
    <script src="../../../kernel/js/terminal/terminal-profile.js"></script>
    <script src="../../../kernel/js/terminal/terminal-core.js"></script>
    <script src="../../../kernel/js/terminal/terminal.js"></script>
    <script src="../../../kernel/js/terminal/executeCommand.js"></script>
    <script src="../../../kernel/js/terminal/filesystem.js"></script>
    <script src="../../../kernel/js/terminal/manuel.js"></script>
    <script src="../../../kernel/js/volume.js"></script>
    <script src="../../../kernel/js/librewriter.js"></script>
    <script src="../../../kernel/js/update-manager.js"></script>
</body>
</html>
